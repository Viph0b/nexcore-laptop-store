<div class="cart-sidenav" *ngIf="(sidenav.open$ | async)">
  <div class="cart-backdrop" (click)="close()"></div>

  <aside class="cart-panel" role="dialog" aria-label="Shopping cart" (click)="$event.stopPropagation()">
    <!-- Header -->
    <header class="cart-head">
      <div class="cart-head__title">
        <h3>Your Cart</h3>
        <span class="cart-count">{{ (items$ | async)?.length || 0 }} items</span>
      </div>
      <button class="cart-close" aria-label="Close cart" (click)="close()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M18 6 6 18M6 6l12 12" />
        </svg>
      </button>
    </header>

    <!-- Items -->
    <div class="cart-items">
      <div class="cart-item" *ngFor="let item of (items$ | async)">
        <div class="cart-item__top">
          <span class="cart-item__title">{{ item.product.name }}</span>
          <button class="cart-item__remove" aria-label="Remove item" (click)="remove(item.product.id)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" />
            </svg>
          </button>
        </div>

        <div class="cart-item__bottom">
          <div class="qty">
            <button class="qty__btn" aria-label="Decrease" (click)="updateQuantity(item.product.id, item.quantity - 1)">−</button>
            <input class="qty__input" type="number" min="1" [value]="item.quantity"
                   (change)="updateQuantity(item.product.id, $any($event.target).value)" />
            <button class="qty__btn" aria-label="Increase" (click)="updateQuantity(item.product.id, item.quantity + 1)">+</button>
          </div>
          <span class="cart-item__price">{{ item.product.price | currency }}</span>
        </div>
      </div>

      <!-- Empty state -->
      <div *ngIf="(items$ | async)?.length === 0" class="cart-empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1" /><circle cx="20" cy="21" r="1" />
          <path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6" />
        </svg>
        <p>Your cart is empty</p>
        <span>Add a product to get started.</span>
      </div>
    </div>

    <!-- Footer -->
    <footer class="cart-footer" *ngIf="(items$ | async)?.length">
      <div class="cart-total">
        <span>Total</span>
        <strong>{{ total$ | async | currency }}</strong>
      </div>
      <button class="btn btn--primary btn--full">Checkout</button>
      <button class="btn btn--ghost btn--full" (click)="close()">Continue shopping</button>
    </footer>
  </aside>
</div>
