<article class="product-card card">
  <a [routerLink]="['/products', product().id]" class="product-card__image-link">
    <img [src]="product().images[0]" [alt]="product().name" class="product-card__image" loading="lazy" />
  </a>
  <div class="product-card__body">
    <h3 class="product-card__name">
      <a [routerLink]="['/products', product().id]">{{ product().name }}</a>
    </h3>
    <p class="product-card__specs">
      {{ product().specs.cpu }} · {{ product().specs.ram }} · {{ product().specs.display }}
    </p>
    <div class="product-card__footer">
      <span class="product-card__price">{{ product().price | currency: 'USD' : 'symbol' : '1.0-0' }}</span>
      <a [routerLink]="['/products', product().id]" class="btn btn--ghost btn--sm">View Details</a>
    </div>
  </div>
</article>
